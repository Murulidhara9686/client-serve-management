# ==========================================
# ClientServe — Application Configuration
# ==========================================

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/client_service_db
spring.datasource.username=root
spring.datasource.password=NewPassword123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# 'update' will ALTER existing tables and CREATE missing ones automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server
server.port=8080
server.error.whitelabel.enabled=false

# Session timeout — 90 minutes
server.servlet.session.timeout=90m
