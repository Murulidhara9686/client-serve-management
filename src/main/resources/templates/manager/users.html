<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Team — ClientServe</title>
<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-shell">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:#fff"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
    <div class="sidebar-wordmark">Client<span>Serve</span></div>
  </div>
  <div class="sidebar-user">
    <div class="su-name" th:text="${user.name}"></div>
    <div class="su-email" th:text="${user.email}"></div>
    <div class="su-badge">Manager</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Navigation</div>
    <a th:href="@{/manager/dashboard}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
    <a th:href="@{/manager/users}" class="nav-link active">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Team</a>
    <a th:href="@{/stats}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Analytics</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post"><button type="submit" class="btn-logout"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign out</button></form>
  </div>
</aside>
<div class="main-content">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebarToggle"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div><div class="topbar-title">Team Management</div><div class="topbar-sub">All platform users by role</div></div>
    </div>
  </header>
  <main class="page-body">
    <!-- Assistants -->
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-3">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem">Assistant Managers</div>
        <span style="background:var(--bg-2);border:1px solid var(--border);padding:2px 10px;border-radius:99px;font-size:.72rem;font-weight:700;color:var(--mu)" th:text="${#lists.size(assistants)}">0</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
        <div class="card" th:each="u : ${assistants}" style="padding:18px;display:flex;align-items:center;gap:14px">
          <div class="avatar avatar-teal" th:text="${#strings.toUpperCase(#strings.substring(u.name,0,1))}">A</div>
          <div style="min-width:0">
            <div class="font-semi text-sm truncate" th:text="${u.name}"></div>
            <div class="text-xs text-mu truncate" th:text="${u.email}"></div>
            <div class="text-xs text-mu" th:if="${u.phone != null}" th:text="${u.phone}"></div>
            <span style="display:inline-block;margin-top:5px;padding:2px 8px;border-radius:99px;font-size:.66rem;font-weight:700;background:#f0fdfa;color:#0d9488;border:1px solid #99f6e4">Assistant Manager</span>
          </div>
        </div>
        <div th:if="${#lists.isEmpty(assistants)}" class="text-sm text-mu" style="padding:12px">No assistant managers yet.</div>
      </div>
    </div>
    <!-- Employees -->
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-3">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem">Employees</div>
        <span style="background:var(--bg-2);border:1px solid var(--border);padding:2px 10px;border-radius:99px;font-size:.72rem;font-weight:700;color:var(--mu)" th:text="${#lists.size(employees)}">0</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
        <div class="card" th:each="u : ${employees}" style="padding:18px;display:flex;align-items:center;gap:14px">
          <div class="avatar avatar-amber" th:text="${#strings.toUpperCase(#strings.substring(u.name,0,1))}">E</div>
          <div style="min-width:0">
            <div class="font-semi text-sm truncate" th:text="${u.name}"></div>
            <div class="text-xs text-mu truncate" th:text="${u.email}"></div>
            <div class="text-xs text-mu" th:if="${u.phone != null}" th:text="${u.phone}"></div>
            <span style="display:inline-block;margin-top:5px;padding:2px 8px;border-radius:99px;font-size:.66rem;font-weight:700;background:#fffbeb;color:#d97706;border:1px solid #fde68a">Employee</span>
          </div>
        </div>
        <div th:if="${#lists.isEmpty(employees)}" class="text-sm text-mu" style="padding:12px">No employees yet.</div>
      </div>
    </div>
    <!-- Customers -->
    <div>
      <div class="flex items-center gap-2 mb-3">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem">Customers</div>
        <span style="background:var(--bg-2);border:1px solid var(--border);padding:2px 10px;border-radius:99px;font-size:.72rem;font-weight:700;color:var(--mu)" th:text="${#lists.size(customers)}">0</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
        <div class="card" th:each="u : ${customers}" style="padding:18px;display:flex;align-items:center;gap:14px">
          <div class="avatar avatar-orange" th:text="${#strings.toUpperCase(#strings.substring(u.name,0,1))}">C</div>
          <div style="min-width:0">
            <div class="font-semi text-sm truncate" th:text="${u.name}"></div>
            <div class="text-xs text-mu truncate" th:text="${u.email}"></div>
            <div class="text-xs text-mu" th:if="${u.phone != null}" th:text="${u.phone}"></div>
            <span style="display:inline-block;margin-top:5px;padding:2px 8px;border-radius:99px;font-size:.66rem;font-weight:700;background:#fff5f0;color:#f97316;border:1px solid #fed7aa">Customer</span>
          </div>
        </div>
        <div th:if="${#lists.isEmpty(customers)}" class="text-sm text-mu" style="padding:12px">No customers yet.</div>
      </div>
    </div>
  </main>
</div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
