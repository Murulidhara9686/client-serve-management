<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profile — ClientServe</title>
<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-shell">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:#fff"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
    <div class="sidebar-wordmark">Client<span>Serve</span></div>
  </div>
  <div class="sidebar-user">
    <div class="su-name" th:text="${user.name}"></div>
    <div class="su-email" th:text="${user.email}"></div>
    <div class="su-badge">Customer</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Navigation</div>
    <a th:href="@{/customer/dashboard}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
    <a th:href="@{/customer/profile}" class="nav-link active">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post"><button type="submit" class="btn-logout"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign out</button></form>
  </div>
</aside>
<div class="main-content">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebarToggle"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div><div class="topbar-title">My Profile</div><div class="topbar-sub">Update your name and contact details</div></div>
    </div>
  </header>
  <main class="page-body" style="max-width:520px">
    <div class="card">
      <div class="card-body">
        <div style="text-align:center;padding-bottom:20px;margin-bottom:20px;border-bottom:1px solid var(--border)">
          <div class="avatar avatar-orange" style="width:64px;height:64px;font-size:1.5rem;margin:0 auto 12px" th:text="${#strings.toUpperCase(#strings.substring(user.name,0,1))}">R</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem" th:text="${user.name}"></div>
          <div class="text-sm text-mu mt-1" th:text="${user.email}"></div>
          <span style="display:inline-block;margin-top:8px;padding:3px 12px;border-radius:99px;font-size:.72rem;font-weight:700;background:#fff5f0;color:#f97316;border:1px solid #fed7aa">Customer</span>
        </div>
        <form th:action="@{/customer/profile/update}" method="post">
          <div class="form-group"><label class="form-label">Full Name</label><input type="text" name="name" class="form-control" th:value="${user.name}" required/></div>
          <div class="form-group"><label class="form-label">Email <span class="text-mu" style="font-weight:400">(cannot change)</span></label><input type="email" class="form-control" th:value="${user.email}" disabled style="opacity:.6;cursor:not-allowed"/></div>
          <div class="form-group"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" th:value="${user.phone}" placeholder="9876543210"/></div>
          <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
        </form>
        <div style="margin-top:12px;text-align:center"><a th:href="@{/customer/dashboard}" class="btn btn-ghost btn-sm">← Back to Dashboard</a></div>
      </div>
    </div>
  </main>
</div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
