<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Access Denied — ClientServe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;border:1px solid #e2e8f0;padding:52px 44px;max-width:460px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.07)}
.icon{font-size:3rem;margin-bottom:16px}
.title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:#0f172a;margin-bottom:8px}
.sub{font-size:.9rem;color:#64748b;line-height:1.65;margin-bottom:24px}
.btn{display:inline-block;padding:10px 24px;background:#0f172a;color:#fff;border-radius:10px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;transition:background .18s}
.btn:hover{background:#6366f1}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <div class="title">Access Denied</div>
  <div class="sub">You don't have permission to view this page. Please sign in with the correct account.</div>
  <a th:href="@{/}" class="btn">← Back to Login</a>
</div>
</body>
</html>
